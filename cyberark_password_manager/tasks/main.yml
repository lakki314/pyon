---
# Main tasks file for cyberark_password_manager role

- name: Set environment-based configuration if cyberark_env is specified
  ansible.builtin.set_fact:
    cyberark_api_base_url: "{{ cyberark_environments[cyberark_env].api_base_url }}"
    cyberark_client_cert: "{{ cyberark_environments[cyberark_env].client_cert }}"
    cyberark_client_key: "{{ cyberark_environments[cyberark_env].client_key }}"
    cyberark_safe_name: "{{ cyberark_environments[cyberark_env].safe_name }}"
    cyberark_reconcile_api_base_url: "{{ cyberark_environments[cyberark_env].reconcile_api_base_url }}"
    cyberark_reconcile_username: "{{ cyberark_environments[cyberark_env].reconcile_username }}"
    cyberark_reconcile_password: "{{ cyberark_environments[cyberark_env].reconcile_password }}"
  when:
    - cyberark_env is defined
    - cyberark_env | length > 0
    - cyberark_env in cyberark_environments

- name: Validate cyberark_env if specified
  ansible.builtin.assert:
    that:
      - cyberark_env in cyberark_environments
    fail_msg: "Invalid cyberark_env '{{ cyberark_env }}'. Valid options: {{ cyberark_environments.keys() | list | join(', ') }}"
  when:
    - cyberark_env is defined
    - cyberark_env | length > 0

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - cyberark_api_base_url is defined
      - cyberark_api_base_url | length > 0
      - cyberark_client_cert is defined
      - cyberark_client_cert | length > 0
      - cyberark_client_key is defined
      - cyberark_client_key | length > 0
      - cyberark_safe_name is defined
      - cyberark_safe_name | length > 0
    fail_msg: "Required CyberArk configuration variables are missing. Either set cyberark_env or provide manual configuration."
    quiet: true

- name: Verify client certificate exists
  ansible.builtin.stat:
    path: "{{ cyberark_client_cert }}"
  register: _cert_check
  failed_when: not _cert_check.stat.exists
  changed_when: false

- name: Verify client key exists
  ansible.builtin.stat:
    path: "{{ cyberark_client_key }}"
  register: _key_check
  failed_when: not _key_check.stat.exists
  changed_when: false

- name: Check if any account needs reconciliation
  ansible.builtin.set_fact:
    _needs_reconcile: "{{ cyberark_account_config.values() | selectattr('reconcile', 'defined') | selectattr('reconcile', 'equalto', true) | list | length > 0 }}"

- name: Create CyberArk session for reconciliation (username/password auth)
  cyberark.pas.cyberark_authentication:
    api_base_url: "{{ cyberark_reconcile_api_base_url }}"
    username: "{{ cyberark_reconcile_username }}"
    password: "{{ cyberark_reconcile_password }}"
    validate_certs: "{{ cyberark_validate_certs }}"
  register: _cyberark_session
  no_log: true
  when: _needs_reconcile | bool

- name: Discover user variables ending with _user
  ansible.builtin.set_fact:
    _cyberark_user_vars: "{{ vars.keys() | select('match', '.*_user$') | list }}"

- name: Validate at least one user variable is defined
  ansible.builtin.assert:
    that:
      - _cyberark_user_vars | length > 0
    fail_msg: "No user variables found. Please define variables ending with '_user' (e.g., was_user: wasadmin)"
    quiet: true

- name: Initialize password facts dictionary
  ansible.builtin.set_fact:
    _cyberark_retrieved_passwords: {}

- name: Process each CyberArk account
  ansible.builtin.include_tasks: process_account.yml
  loop: "{{ _cyberark_user_vars }}"
  loop_control:
    loop_var: user_var_name
    label: "{{ user_var_name }}"

- name: Set password facts for each account
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ _cyberark_retrieved_passwords | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true

- name: Logoff from CyberArk reconciliation session
  cyberark.pas.cyberark_authentication:
    api_base_url: "{{ cyberark_reconcile_api_base_url }}"
    cyberark_session: "{{ _cyberark_session }}"
    validate_certs: "{{ cyberark_validate_certs }}"
    state: absent
  no_log: true
  when:
    - _needs_reconcile | bool
    - _cyberark_session is defined
